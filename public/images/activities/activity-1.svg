<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF6F0" />
      <stop offset="100%" stop-color="#E4DCCF" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" />

  <!-- table -->
  <rect x="60" y="360" width="680" height="180" rx="24" fill="#C9B79C" />

  <!-- board -->
  <rect x="160" y="300" width="480" height="240" rx="18" fill="#0F2B63" />
  <g stroke="#FAF6F0" stroke-opacity="0.2" stroke-width="2">
    <line x1="270" y1="300" x2="270" y2="540" />
    <line x1="400" y1="300" x2="400" y2="540" />
    <line x1="530" y1="300" x2="530" y2="540" />
    <line x1="160" y1="380" x2="640" y2="380" />
    <line x1="160" y1="460" x2="640" y2="460" />
  </g>

  <!-- pieces -->
  <circle cx="270" cy="420" r="22" fill="#FAF6F0" />
  <circle cx="360" cy="450" r="22" fill="#26221D" />
  <circle cx="450" cy="400" r="22" fill="#FAF6F0" />
  <circle cx="540" cy="440" r="22" fill="#26221D" />

  <!-- die -->
  <g transform="translate(400,500) rotate(-8)">
    <rect x="-28" y="-28" width="56" height="56" rx="10" fill="#FAF6F0" />
    <circle cx="-12" cy="-12" r="4.5" fill="#26221D" />
    <circle cx="12" cy="-12" r="4.5" fill="#26221D" />
    <circle cx="0" cy="0" r="4.5" fill="#26221D" />
    <circle cx="-12" cy="12" r="4.5" fill="#26221D" />
    <circle cx="12" cy="12" r="4.5" fill="#26221D" />
  </g>

  <text x="400" y="120" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#26221D" opacity="0.5">
    Placeholder — ganti dengan foto asli
  </text>
</svg>
