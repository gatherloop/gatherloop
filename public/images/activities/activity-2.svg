<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF6F0" />
      <stop offset="100%" stop-color="#E4DCCF" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" />

  <!-- table -->
  <rect x="60" y="400" width="680" height="140" rx="24" fill="#C9B79C" />

  <!-- small board on table -->
  <rect x="280" y="340" width="240" height="120" rx="14" fill="#0F2B63" />

  <!-- game master figure (standing, pointing) -->
  <circle cx="560" cy="230" r="46" fill="#0F2B63" />
  <rect x="514" y="276" width="92" height="150" rx="30" fill="#0F2B63" />
  <rect x="440" y="300" width="90" height="26" rx="13" fill="#0F2B63" transform="rotate(-18 440 300)" />

  <!-- guest figure (seated) -->
  <circle cx="240" cy="260" r="40" fill="#26221D" opacity="0.7" />
  <rect x="198" y="300" width="84" height="110" rx="26" fill="#26221D" opacity="0.7" />

  <!-- speech bubble -->
  <g fill="#FAF6F0" stroke="#0F2B63" stroke-width="3">
    <rect x="360" y="150" width="180" height="80" rx="18" />
    <path d="M420 230 L410 260 L450 230 Z" />
  </g>
  <circle cx="410" cy="190" r="7" fill="#0F2B63" />
  <circle cx="450" cy="190" r="7" fill="#0F2B63" />
  <circle cx="490" cy="190" r="7" fill="#0F2B63" />

  <text x="400" y="100" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#26221D" opacity="0.5">
    Placeholder — ganti dengan foto asli
  </text>
</svg>
