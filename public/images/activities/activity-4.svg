<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF6F0" />
      <stop offset="100%" stop-color="#E4DCCF" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" />

  <!-- table -->
  <rect x="60" y="360" width="680" height="180" rx="24" fill="#C9B79C" />

  <!-- plate with food -->
  <circle cx="290" cy="380" r="90" fill="#FAF6F0" stroke="#0F2B63" stroke-width="3" />
  <circle cx="270" cy="365" r="18" fill="#0F2B63" opacity="0.7" />
  <circle cx="310" cy="380" r="14" fill="#0F2B63" opacity="0.5" />
  <circle cx="285" cy="405" r="12" fill="#0F2B63" opacity="0.6" />

  <!-- drink glass -->
  <path d="M470 300 L560 300 L545 430 L485 430 Z" fill="#FAF6F0" stroke="#0F2B63" stroke-width="3" />
  <path d="M475 320 L555 320 L545 430 L485 430 Z" fill="#0F2B63" opacity="0.35" />
  <rect x="500" y="270" width="30" height="40" rx="6" fill="#0F2B63" />

  <!-- steam / sparkle -->
  <g stroke="#0F2B63" stroke-width="4" stroke-linecap="round" opacity="0.4">
    <path d="M270 260 q10 -20 0 -40" fill="none" />
    <path d="M300 260 q10 -20 0 -40" fill="none" />
  </g>

  <text x="400" y="130" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#26221D" opacity="0.5">
    Placeholder — ganti dengan foto asli
  </text>
</svg>
