<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF6F0" />
      <stop offset="100%" stop-color="#E4DCCF" />
    </linearGradient>
  </defs>

  <rect width="960" height="720" fill="url(#bg)" />

  <!-- soft crowd silhouettes -->
  <circle cx="230" cy="270" r="80" fill="#1F6F54" opacity="0.12" />
  <circle cx="740" cy="250" r="95" fill="#1F6F54" opacity="0.1" />

  <!-- table -->
  <rect x="70" y="430" width="820" height="220" rx="28" fill="#C9B79C" />

  <!-- board game mat -->
  <rect x="190" y="360" width="580" height="300" rx="22" fill="#1F6F54" />
  <rect x="190" y="360" width="580" height="300" rx="22" fill="none" stroke="#FAF6F0" stroke-opacity="0.25" stroke-width="2" />

  <!-- board grid -->
  <g stroke="#FAF6F0" stroke-opacity="0.2" stroke-width="2">
    <line x1="330" y1="360" x2="330" y2="660" />
    <line x1="480" y1="360" x2="480" y2="660" />
    <line x1="630" y1="360" x2="630" y2="660" />
    <line x1="190" y1="440" x2="770" y2="440" />
    <line x1="190" y1="540" x2="770" y2="540" />
  </g>

  <!-- pieces -->
  <circle cx="330" cy="480" r="26" fill="#FAF6F0" />
  <circle cx="430" cy="510" r="26" fill="#26221D" />
  <circle cx="540" cy="460" r="26" fill="#FAF6F0" />
  <circle cx="640" cy="520" r="26" fill="#26221D" />

  <!-- die -->
  <g transform="translate(475,590) rotate(10)">
    <rect x="-32" y="-32" width="64" height="64" rx="12" fill="#FAF6F0" />
    <circle cx="-14" cy="-14" r="5.5" fill="#26221D" />
    <circle cx="14" cy="-14" r="5.5" fill="#26221D" />
    <circle cx="0" cy="0" r="5.5" fill="#26221D" />
    <circle cx="-14" cy="14" r="5.5" fill="#26221D" />
    <circle cx="14" cy="14" r="5.5" fill="#26221D" />
  </g>

  <text x="480" y="130" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#26221D" opacity="0.55">
    Foto suasana Gatherloop
  </text>
  <text x="480" y="166" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#26221D" opacity="0.4">
    (placeholder — ganti dengan foto asli)
  </text>
</svg>
